<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحة الأرباح</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #1c1c1c; color: white; text-align: center; padding: 20px; }
        .ad-box { background: #333; border: 2px dashed #ffd700; padding: 20px; margin: 20px 0; border-radius: 10px; }
        .btn { background: #28a745; color: white; padding: 15px 30px; border: none; border-radius: 5px; cursor: pointer; font-size: 18px; }
        .btn:disabled { background: #555; }
        #timer { color: #ffd700; font-weight: bold; }
    </style>
</head>
<body>
    <h2 id="page-title">الصفحة 1 من 8</h2>
    
    <div class="ad-box">
        <p>إعلان رقم 1 (بانتظار المشاهدة...)</p>
    </div>

    <div class="ad-box">
        <p>إعلان رقم 2 (بانتظار المشاهدة...)</p>
    </div>

    <p>انتظر <span id="timer">10</span> ثوانٍ لتفعيل الزر...</p>
    <button id="next-btn" class="btn" disabled onclick="nextPage()">التالي ➡️</button>

    <script>
        let currentPage = 1;
        let timeLeft = 10;
        const tg = window.Telegram.WebApp;
        tg.expand(); // توسيع النافذة لتملأ الشاشة

        function startTimer() {
            let timerElement = document.getElementById('timer');
            let btn = document.getElementById('next-btn');
            let interval = setInterval(() => {
                timeLeft--;
                timerElement.innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(interval);
                    btn.disabled = false;
                    btn.innerText = (currentPage === 8) ? "إنهاء واستلام الأرباح 💰" : "انتقل للصفحة التالية";
                }
            }, 1000);
        }

        function nextPage() {
            if (currentPage < 8) {
                currentPage++;
                timeLeft = 10;
                document.getElementById('page-title').innerText = `الصفحة ${currentPage} من 8`;
                document.getElementById('next-btn').disabled = true;
                startTimer();
                // هنا يمكنك إضافة كود لتغيير الإعلانات ديناميكياً
            } else {
                // إرسال البيانات للبوت عند الانتهاء
                tg.sendData("task_completed");
                tg.close();
            }
        }

        window.onload = startTimer;
    </script>
</body>
</html>
